# Kubernetes API Server configuration
# Uses extractedprism local LB instead of vipalived VIP for resilience
# against macb silent network death (LP #2133877)
k8sServiceHost: "127.0.0.1"
k8sServicePort: "7445"

# Enable kube-proxy replacement
kubeProxyReplacement: "true"
kubeProxyReplacementHealthzBindAddr: "0.0.0.0:10256"

# MTU configuration
mtu: 1500

# Devices for BPF attachment and direct routing detection.
# Primary uplink is the SFP+ NIC ens2 (10G, holds the 172.16.101.4
# reservation); eno2 (onboard Broadcom 1G) is the backup. ens2 revived
# 2026-06-26 after a reboot, so both families must carry the BPF datapath
# and masquerade — otherwise pod egress over the active uplink is not SNATed
# and all upstream DNS/forward traffic times out.
devices: "eno+,ens+"

# Routing configuration
# Native routing for better performance on same L2 network
routingMode: "native"
autoDirectNodeRoutes: true
ipv4NativeRoutingCIDR: "10.42.0.0/16"

# IPAM configuration for Pod networking
ipam:
  mode: "kubernetes"

# L2 Announcements for LoadBalancer services
l2announcements:
  enabled: true
  leaseDuration: 15s
  leaseRenewDeadline: 5s
  leaseRetryPeriod: 2s

# Load Balancer configuration
loadBalancer:
  algorithm: random

# Socket-level load balancing - bypasses iptables for lower latency
socketLB:
  enabled: true

# Bandwidth Manager with BBR for improved throughput and latency
bandwidthManager:
  enabled: true
  bbr: true

# BPF optimizations
bpf:
  masquerade: true
  hostLegacyRouting: false
  # Netkit device mode for lower pod networking overhead (requires kernel 6.8+)
  datapathMode: netkit
  # Distributed LRU for reduced spinlock contention under high connection load
  distributedLRU:
    enabled: true
  # Dynamic map sizing (1% of node memory for CT/NAT maps)
  mapDynamicSizeRatio: 0.01

# Enable L2 neighbor discovery
l2NeighDiscovery:
  enabled: true

# Operator configuration
operator:
  replicas: 1
  # Requests lift the operator out of BestEffort QoS (it is not on the
  # datapath, but evicting it stalls LB-IPAM / gateway reconciliation).
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      memory: 256Mi

# Envoy proxy - disable external DaemonSet, use embedded in Cilium agent
envoy:
  enabled: false

# Hubble network observability — single-node, use CLI only (hubble observe
# on the node); Relay + UI are distributed-cluster luxuries.
hubble:
  enabled: true
  peerService:
    clusterDomain: k8s.home.lex.la
  relay:
    enabled: false
  ui:
    enabled: false

# Gateway API support
gatewayAPI:
  enabled: true
  enableAlpn: true
  # cilium-secrets Namespace is owned by the `namespaces` ArgoCD app
  # (PSS labels). Three chart sections (gatewayAPI, envoyConfig,
  # ingressController) each declare a `cilium-secrets` Namespace with
  # create=true by default — the template renders it if ANY of them
  # is true. All three must be set to create=false to avoid the
  # SharedResourceWarning between cilium and namespaces ArgoCD apps.
  secretsNamespace:
    create: false
    name: cilium-secrets

envoyConfig:
  secretsNamespace:
    create: false
    name: cilium-secrets

ingressController:
  secretsNamespace:
    create: false
    name: cilium-secrets

# Fifth (separate-branch) source in templates/cilium-secrets-namespace.yaml
tls:
  secretsNamespace:
    create: false
    name: cilium-secrets

# Tolerations for Cilium agent DaemonSet
tolerations:
  - operator: Exists
