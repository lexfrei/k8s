global:
  domain: argocd.home.lex.la
  affinity:
    podAntiAffinity: soft
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
configs:
  params:
    server.insecure: true
    controller.status.processors: "10"
    controller.operation.processors: "5"
    controller.kubectl.parallelism.limit: "5"
    controller.repo.server.timeout.seconds: "90"
    controller.self.heal.backoff.timeout.seconds: "5"
    controller.self.heal.backoff.cap.seconds: "600"
    controller.cluster.cache.events.processing.interval: "200ms"
    controller.k8s.client.qps: "20"
    controller.k8s.client.burst: "40"
    reposerver.parallelism.limit: "2"
  cm:
    # Disable local admin login - OIDC only
    admin.enabled: "false"
    accounts.homepage: apiKey
    url: https://argocd.home.lex.la
    timeout.reconciliation: 300s
    timeout.hard.reconciliation: 0s
    resource.ignoreResourceUpdatesEnabled: "true"
    # Using Dex for OIDC - Authelia includes all claims in ID token via claims_policy
    dex.config: |
      connectors:
        - type: oidc
          id: authelia
          name: Authelia
          config:
            issuer: https://authelia.lex.la
            clientID: argocd
            clientSecret: $argocd-dex-authelia:dex.authelia.clientSecret
            scopes:
              - openid
              - profile
              - email
              - groups
            userNameKey: preferred_username
            # Allow Dex to read and propagate groups claim from ID token
            # "insecure" refers to groups not updating on token refresh, not a security issue
            insecureEnableGroups: true
            insecureSkipEmailVerified: true
    application.resourceTrackingMethod: annotation
  rbac:
    policy.csv: |
      g, admins, role:admin
      p, homepage, applications, get, */*, allow
  secret:
    resource.compareoptions: |
      ignoreAggregatedRoles: true
    resource.exclusions: |
      - apiGroups:
        - "*"
        kinds:
        - ProviderConfigUsage
    resource.customizations: ""
controller:
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 768Mi
  env:
    - name: GOMEMLIMIT
      value: "600MiB"
repoServer:
  replicas: 1
  pdb:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
  env:
    - name: GOMEMLIMIT
      value: "400MiB"
    # The obico-server repo is ~300MB (built frontend bundles are checked into
    # the release branch); the initial clone cannot finish within the default
    # 90s exec timeout, and a timeout-killed fetch leaves tmp_pack garbage
    # behind (argo-cd#18831), so give git enough time to finish.
    - name: ARGOCD_EXEC_TIMEOUT
      value: "5m"
server:
  replicas: 1
  pdb:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
  service:
    type: LoadBalancer
    annotations:
      io.cilium/lb-ipam-ips: "172.16.100.254"
      external-dns.alpha.kubernetes.io/hostname: "api.argocd.home.lex.la"
  ingress:
    enabled: false
  httproute:
    enabled: true
    annotations: {}
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: cilium-gateway-internal
        namespace: kube-system
        sectionName: https-home-lex-la
    hostnames:
      - argocd.home.lex.la
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
redis:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi
dex:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi
  # Init container `copyutil` copies the 219 MB argocd binary (v3.4.2)
  # into the dex pod's shared volume. Under cgroup v2 the page cache
  # of that copy counts against memory.max — chart default 64Mi OOMs
  # mid-copy, `cp -n` then skips the partial file on retry, dex execs
  # the corrupt binary and SIGSEGVs forever. 256Mi gives safe headroom.
  initImage:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 256Mi
notifications:
  enabled: false
applicationSet:
  replicas: 0
