---
# Deploy Samba file server with Avahi mDNS on storage nodes
# Shares: TimeMachine (per-user), Lex, Dump, Music, Transmission, Timelapses
#
# After deployment, set passwords imperatively:
#   ssh ansible@172.16.101.4
#   sudo smbpasswd -a lex
#   sudo smbpasswd -a daria

- name: Deploy Samba file server
  hosts: storage
  become: true
  serial: 1
  tags:
    - samba

  handlers:
    # Restart, not reload: smbd binds its listening sockets at start with
    # "bind interfaces only = yes" and a SIGHUP reload does NOT re-bind them
    # when the interface set or an interface address changed. A full restart
    # is required for smbd to pick up the current NIC addresses.
    - name: Restart smbd
      ansible.builtin.systemd:
        name: smbd
        state: restarted

    - name: Restart Avahi
      ansible.builtin.systemd:
        name: avahi-daemon
        state: restarted

  tasks:
    - name: Remove obsolete resolute Samba pin (resolute is now the running suite on 26.04)
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/resolute-samba.sources
        - /etc/apt/preferences.d/resolute-samba.pref
      register: resolute_pin_cleanup

    - name: Update apt cache after removing resolute pin
      ansible.builtin.apt:
        update_cache: true
      when: resolute_pin_cleanup.changed

    - name: Install Samba packages
      ansible.builtin.apt:
        name:
          - samba
          - samba-common-bin
          # Event-driven rebind of smbd on uplink address changes (see the
          # networkd-dispatcher hook task below).
          - networkd-dispatcher
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Disable NetBIOS — stop and mask nmbd (clients discover via mDNS)
      ansible.builtin.systemd:
        name: nmbd
        state: stopped
        enabled: false
        masked: true

    - name: Deploy smb.conf
      ansible.builtin.copy:
        src: ../files/smb.conf
        dest: /etc/samba/smb.conf
        mode: "0644"
        owner: root
        group: root
      notify:
        - Restart smbd

    - name: Ensure passdb directory exists
      ansible.builtin.file:
        path: /var/lib/samba/private
        state: directory
        mode: "0700"
        owner: root
        group: root

    - name: Set permissions on guest-writable share directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: nobody
        group: nogroup
        mode: "0775"
      loop:
        - /pool/dump
        - /pool/music

    - name: Enable and start Samba
      ansible.builtin.systemd:
        name: smbd
        enabled: true
        state: started

    # smbd binds its sockets once at start and never re-binds. If it starts
    # before the uplink has an address it sits on loopback; if it starts
    # after SLAAC but before DHCPv4 it binds IPv6 only and SMB stays dead
    # over IPv4. The helper below checks specifically for a routable IPv4
    # listener and restarts smbd when one is missing.
    - name: Install smbd rebind helper
      ansible.builtin.copy:
        src: ../files/rebind-smbd
        dest: /usr/local/sbin/rebind-smbd
        mode: "0755"
        owner: root
        group: root

    - name: Ensure networkd-dispatcher hook directories exist
      ansible.builtin.file:
        path: "/etc/networkd-dispatcher/{{ item }}"
        state: directory
        mode: "0755"
        owner: root
        group: root
      loop:
        - routable.d
        - configured.d

    # Both event types: an address can arrive on an interface that is already
    # routable, which emits "configured" rather than a new "routable".
    - name: Hook the rebind helper into networkd-dispatcher events
      ansible.builtin.file:
        src: /usr/local/sbin/rebind-smbd
        dest: "/etc/networkd-dispatcher/{{ item }}/10-rebind-smbd"
        state: link
        force: true
      loop:
        - routable.d
        - configured.d

    - name: Enable and start networkd-dispatcher
      ansible.builtin.systemd:
        name: networkd-dispatcher
        enabled: true
        state: started

    # Backstop: the event-driven path already missed a DHCPv4 arrival once
    # (2026-07-19), leaving smbd bound to SLAAC IPv6 only.
    - name: Install smbd rebind backstop units
      ansible.builtin.copy:
        src: "../files/{{ item }}"
        dest: "/etc/systemd/system/{{ item }}"
        mode: "0644"
        owner: root
        group: root
      loop:
        - smbd-rebind.service
        - smbd-rebind.timer

    - name: Enable and start the smbd rebind timer
      ansible.builtin.systemd:
        name: smbd-rebind.timer
        enabled: true
        state: started
        daemon_reload: true

    # Heal the current state during the run too, instead of waiting for the
    # next event or timer tick. The helper is idempotent: it exits without
    # touching smbd when a routable IPv4 listener already exists.
    - name: Rebind smbd now if it has no routable IPv4 listener
      ansible.builtin.command:
        cmd: /usr/local/sbin/rebind-smbd
      changed_when: false

    - name: Install Avahi daemon
      ansible.builtin.apt:
        name: avahi-daemon
        state: present

    - name: Deploy Avahi daemon configuration
      ansible.builtin.copy:
        src: ../files/avahi-daemon.conf
        dest: /etc/avahi/avahi-daemon.conf
        mode: "0644"
        owner: root
        group: root
      notify: Restart Avahi

    - name: Deploy Avahi SMB service advertisement
      ansible.builtin.copy:
        src: ../files/smb.service
        dest: /etc/avahi/services/smb.service
        mode: "0644"
        owner: root
        group: root
      notify: Restart Avahi

    - name: Enable and start Avahi
      ansible.builtin.systemd:
        name: avahi-daemon
        enabled: true
        state: started

    - name: Display post-deployment instructions
      ansible.builtin.debug:
        msg: |
          Samba deployed successfully on {{ inventory_hostname }}.

          Next steps (manual):
          1. Set SMB passwords:
             sudo smbpasswd -a lex
             sudo smbpasswd -a daria

          2. Verify from macOS:
             - NAS should appear in Finder sidebar (mDNS)
             - smb://{{ ansible_host }}/Lex
             - smb://{{ ansible_host }}/Dump
             - smb://{{ ansible_host }}/TimeMachine
             - smb://{{ ansible_host }}/Transmission
