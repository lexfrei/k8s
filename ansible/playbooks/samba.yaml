---
# Deploy Samba file server with Avahi mDNS on storage nodes
# Shares: TimeMachine (per-user), Lex, Dump, Music, Transmission, Timelapses
#
# After deployment, set passwords imperatively:
#   ssh ansible@172.16.101.4
#   sudo smbpasswd -a lex
#   sudo smbpasswd -a daria

- name: Deploy Samba file server
  hosts: storage
  become: true
  serial: 1
  tags:
    - samba

  handlers:
    # Restart, not reload: smbd binds its listening sockets at start with
    # "bind interfaces only = yes" and a SIGHUP reload does NOT re-bind them
    # when the interface set or an interface address changed. A full restart
    # is required for smbd to pick up the current NIC addresses.
    - name: Restart smbd
      ansible.builtin.systemd:
        name: smbd
        state: restarted

    - name: Restart Avahi
      ansible.builtin.systemd:
        name: avahi-daemon
        state: restarted

  tasks:
    - name: Remove obsolete resolute Samba pin (resolute is now the running suite on 26.04)
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/resolute-samba.sources
        - /etc/apt/preferences.d/resolute-samba.pref
      register: resolute_pin_cleanup

    - name: Update apt cache after removing resolute pin
      ansible.builtin.apt:
        update_cache: true
      when: resolute_pin_cleanup.changed

    - name: Install Samba packages
      ansible.builtin.apt:
        name:
          - samba
          - samba-common-bin
          # Event-driven rebind of smbd on uplink address changes (see the
          # networkd-dispatcher hook task below).
          - networkd-dispatcher
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Disable NetBIOS — stop and mask nmbd (clients discover via mDNS)
      ansible.builtin.systemd:
        name: nmbd
        state: stopped
        enabled: false
        masked: true

    - name: Deploy smb.conf
      ansible.builtin.copy:
        src: ../files/smb.conf
        dest: /etc/samba/smb.conf
        mode: "0644"
        owner: root
        group: root
      notify:
        - Restart smbd

    - name: Ensure passdb directory exists
      ansible.builtin.file:
        path: /var/lib/samba/private
        state: directory
        mode: "0700"
        owner: root
        group: root

    - name: Set permissions on guest-writable share directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: nobody
        group: nogroup
        mode: "0775"
      loop:
        - /pool/dump
        - /pool/music

    - name: Enable and start Samba
      ansible.builtin.systemd:
        name: smbd
        enabled: true
        state: started

    - name: Deploy networkd-dispatcher hook to rebind smbd on address changes
      ansible.builtin.copy:
        src: ../files/rebind-smbd
        dest: /etc/networkd-dispatcher/routable.d/10-rebind-smbd
        mode: "0755"
        owner: root
        group: root

    - name: Enable and start networkd-dispatcher
      ansible.builtin.systemd:
        name: networkd-dispatcher
        enabled: true
        state: started

    # smbd binds sockets at start; if it came up before the uplink had a
    # routable IP (boot race, DHCP-reservation drift, uplink failover) it
    # sits on loopback only and is unreachable. Heal that state on every
    # run, idempotently — only restart when no non-loopback listener exists.
    - name: Check whether smbd is listening on a routable (non-loopback) address
      ansible.builtin.shell:
        cmd: >-
          ss -H -tln 'sport = :445' | awk '{print $4}'
          | grep -qvE '^127\.0\.0\.1:|^\[::1\]:'
      register: smbd_lan_bound
      changed_when: false
      failed_when: false

    - name: Restart smbd if it is bound to loopback only
      ansible.builtin.systemd:
        name: smbd
        state: restarted
      when: smbd_lan_bound.rc != 0

    - name: Install Avahi daemon
      ansible.builtin.apt:
        name: avahi-daemon
        state: present

    - name: Deploy Avahi daemon configuration
      ansible.builtin.copy:
        src: ../files/avahi-daemon.conf
        dest: /etc/avahi/avahi-daemon.conf
        mode: "0644"
        owner: root
        group: root
      notify: Restart Avahi

    - name: Deploy Avahi SMB service advertisement
      ansible.builtin.copy:
        src: ../files/smb.service
        dest: /etc/avahi/services/smb.service
        mode: "0644"
        owner: root
        group: root
      notify: Restart Avahi

    - name: Enable and start Avahi
      ansible.builtin.systemd:
        name: avahi-daemon
        enabled: true
        state: started

    - name: Display post-deployment instructions
      ansible.builtin.debug:
        msg: |
          Samba deployed successfully on {{ inventory_hostname }}.

          Next steps (manual):
          1. Set SMB passwords:
             sudo smbpasswd -a lex
             sudo smbpasswd -a daria

          2. Verify from macOS:
             - NAS should appear in Finder sidebar (mDNS)
             - smb://{{ ansible_host }}/Lex
             - smb://{{ ansible_host }}/Dump
             - smb://{{ ansible_host }}/TimeMachine
             - smb://{{ ansible_host }}/Transmission
