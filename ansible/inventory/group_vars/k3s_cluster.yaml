---
# K3s cluster configuration variables
# Applied to all nodes in k3s_cluster group

# Ansible connection settings
ansible_user: ansible
ansible_python_interpreter: /usr/bin/python3
ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

# K3s version is now defined in inventory/production.yaml vars section
# to ensure proper inheritance by server and agent groups

# Cluster token (retrieved from existing cluster)
# Get from: sudo cat /var/lib/rancher/k3s/server/token
# Or encrypt with: ansible-vault encrypt_string 'TOKEN_VALUE' --name 'token'
token: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          64343764646536333037643035303335383932336166383937663433663262393738313234643334
          3835363534663561303635363334353230323039643436350a396631636235656164333066353262
          36616238373133633061616436383231396634663435616265613330326330626334353930363132
          6363373333663838320a383963393062343834353435623835306532323265386635666433613633
          64636663393832303565393536353031626239343965636462353437376565393732303863333865
          39316331643230353465653066373164373538373765356137313231396333326437383838323962
          39303762396635363565626164633965346663666666653835616265363966313362353561656566
          61333866623964663164306139323639643964646239633034333863636439353264363761353032
          36373739656332313331343637363830333933613439636335373631303832653130373934306336
          6364343231323833316337616438373237626639396630643634

# API endpoint (single control plane node on storage-01)
api_endpoint: "172.16.101.4"
api_port: 6443

# Custom K3s server arguments
# These flags match the existing cluster configuration
extra_server_args: >-
  --disable=traefik
  --disable=local-storage
  --disable=servicelb
  --disable=metrics-server
  --disable=coredns
  --disable=runtimes
  --cluster-domain=k8s.home.lex.la
  --disable-network-policy
  --disable-kube-proxy
  --flannel-backend=none
  --tls-san=172.16.101.4
  --tls-san=kubeapi.home.lex.la
  --etcd-arg=quota-backend-bytes=536870912
  --etcd-arg=auto-compaction-mode=periodic
  --etcd-arg=auto-compaction-retention=1h
  --etcd-arg=snapshot-count=10000

# Cluster-wide entries merged into /etc/rancher/k3s/config.yaml on every
# server node. Host-specific additions live in inventory/production.yaml
# as `server_config_extra` on the host. The k3s_server and k3s_upgrade
# roles both read `server_config_yaml | from_yaml`, so we compose it here.
server_config_cluster:
  secrets-encryption: true
  # Pin node-ip to the static reservation. The node is multi-homed: eno2
  # holds the 172.16.101.4 reservation, while ens2 is the previously-dead
  # SFP+ NIC that can REVIVE on reboot and grab a DHCP lease in another
  # subnet (172.16.10.x). Without this pin k3s auto-detects node-ip from
  # whichever default route wins and may pick the wrong address, which no
  # longer matches the registered etcd member peer URL — k3s then refuses
  # to rejoin its own single-node etcd and the cluster never comes up.
  # Caught 2026-06-26 when a kernel-activation reboot revived ens2.
  node-ip: 172.16.101.4
  # etcd snapshot scheduler. MUST live in config.yaml (YAML-parsed), NOT
  # in extra_server_args — the k3s install script escapes asterisks when
  # serializing INSTALL_K3S_EXEC into the systemd ExecStart line, turning
  # "0 */6 * * *" into literal "0 \*/6 \* \* \*", which k3s sees as an
  # invalid cron expression and silently disables the scheduler. Caught
  # 2026-05-17: 23 days without automatic snapshots, only manual saves
  # surviving on disk.
  etcd-snapshot-schedule-cron: "0 */6 * * *"
  etcd-snapshot-retention: 3

server_config_yaml: "{{ (server_config_cluster | default({}) | combine(server_config_extra | default({}))) | to_nice_yaml }}"

# Cluster context name for kubeconfig
cluster_context: k3s-home

# Copy kubeconfig to control node
user_kubectl: true
kubeconfig: "~/.kube/config"

# K3s installation paths
k3s_server_location: "/var/lib/rancher/k3s"
systemd_dir: "/etc/systemd/system"
# Cluster configuration
# Single-node control plane (retired 3x RPi in 2026-04 due to macb LP #2133877).
# extractedprism DaemonSet still present as a thin abstraction on 127.0.0.1:7445
# should CP ever scale out again; for now it has a single backend (storage-01).

# Important: Cilium CNI is deployed via ArgoCD, not during K3s installation
# flannel-backend=none disables default Flannel CNI
