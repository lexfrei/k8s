# Samba configuration for k8s-storage-01
# Managed by Ansible (ansible/playbooks/samba.yaml)
# User passwords set imperatively via smbpasswd

[global]
   netbios name = NAS
   server role = standalone server
   security = user
   passdb backend = tdbsam:/var/lib/samba/private/passdb.tdb
   load printers = no
   log file = /var/log/samba/log.%m
   log level = 1

   # macOS compatibility (built-in fruit VFS)
   vfs objects = catia fruit streams_xattr
   fruit:aapl = yes
   fruit:model = TimeCapsule8,119
   fruit:metadata = stream
   fruit:nfs_aces = no
   ea support = yes

   # Guest access for public shares
   map to guest = Bad User

   # Hardening
   server min protocol = SMB2
   ntlm auth = no

   # NetBIOS/SMB1 discovery disabled — clients use mDNS (avahi) + SMB2/3.
   # nmbd's broadcast browsing made VLC list a dead, slowly-accumulating
   # duplicate of the server alongside the working mDNS entry.
   disable netbios = yes
   smb ports = 445

   # Bind smbd (445) to real NICs only, keeping it off Cilium's pod-CIDR
   # host interface (cilium_host, 10.42.0.0/16) which would otherwise also
   # accept connections on 445.
   interfaces = ens1 ens2 eno1 eno2 lo
   bind interfaces only = yes

   # SMB3 Multi-Channel (Samba 4.4+, improves throughput on multi-NIC clients)
   server multi channel support = yes
   aio read size = 1
   aio write size = 1

[TimeMachine]
   path = /pool/timemachine/%U
   writable = yes
   root preexec = /bin/mkdir -p /pool/timemachine/%U
   fruit:time machine = yes
   fruit:time machine max size = 2T

[Lex]
   path = /pool/lex
   valid users = lex
   writable = yes

[Dump]
   path = /pool/dump
   guest ok = yes
   writable = yes
   force user = nobody
   force group = nogroup
   create mask = 0666
   directory mask = 0777

[Music]
   path = /pool/music
   guest ok = yes
   writable = yes
   force user = nobody
   force group = nogroup
   create mask = 0666
   directory mask = 0777

[Transmission]
   path = /pool/transmission
   guest ok = yes
   read only = yes

[Timelapses]
   path = /pool/obico-media/tsd-timelapses
   guest ok = yes
   read only = yes
