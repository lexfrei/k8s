# Samba configuration for k8s-storage-01
# Managed by Ansible (ansible/playbooks/samba.yaml)
# User passwords set imperatively via smbpasswd

[global]
   netbios name = NAS
   server role = standalone server
   security = user
   passdb backend = tdbsam:/var/lib/samba/private/passdb.tdb
   load printers = no
   log file = /dev/stdout
   log level = 1

   # UID/GID mapping - stable automatic assignment
   idmap config * : backend = autorid
   idmap config * : range = 10000-99999

   # macOS compatibility (built-in fruit VFS)
   vfs objects = catia fruit streams_xattr
   fruit:aapl = yes
   fruit:model = TimeCapsule8,119
   fruit:metadata = stream

   # Guest access for public shares
   map to guest = Bad User

   # Hardening
   server min protocol = SMB2
   ntlm auth = no

[TimeMachine]
   path = /pool/timemachine
   valid users = lex
   writable = yes
   fruit:time machine = yes
   fruit:time machine max size = 2T
   durable handles = yes
   kernel oplocks = no
   kernel share modes = no
   posix locking = no

[Lex]
   path = /pool/lex
   valid users = lex
   writable = yes

[Dump]
   path = /pool/dump
   guest ok = yes
   writable = yes

[Transmission]
   path = /pool/transmission/%U
   valid users = lex, daria
   read only = yes
   root preexec = /bin/mkdir -p /pool/transmission/%U
