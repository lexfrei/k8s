---
# Configure system timezone
# Ensures consistent timestamps across all cluster nodes for log correlation

- name: Set timezone to {{ node_prep_timezone }}
  community.general.timezone:
    name: "{{ node_prep_timezone }}"
  notify: Restart systemd-timesyncd

- name: Check NTP synchronization status
  ansible.builtin.command:
    cmd: timedatectl show --property=NTP --value
  register: ntp_status
  changed_when: false

- name: Enable NTP synchronization
  ansible.builtin.command:
    cmd: timedatectl set-ntp true
  when: ntp_status.stdout != "yes"
  changed_when: true
