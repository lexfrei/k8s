---
# Configure journald for volatile storage
# Keeps the journal entirely in tmpfs (/run/log/journal); nothing is
# written to disk. Logs are shipped to Loki, so on-disk journald
# retention only wastes space and I/O.

- name: Set journald storage to volatile
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: "^#?Storage="
    line: "Storage=volatile"
    state: present
  register: journald_storage

- name: Set journald max runtime size
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: "^#?RuntimeMaxUse="
    line: "RuntimeMaxUse={{ node_prep_journald_runtime_max_use }}"
    state: present
  register: journald_runtime

- name: Restart journald to apply volatile storage
  ansible.builtin.systemd:
    name: systemd-journald
    state: restarted
  when: journald_storage.changed or journald_runtime.changed

- name: Remove leftover persistent journal directory
  # Runs after the restart so journald has released its handles and now
  # writes to /run; this reclaims any journal previously flushed to disk.
  ansible.builtin.file:
    path: /var/log/journal
    state: absent
