apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-myshows
  namespace: mcp-myshows
  labels:
    app.kubernetes.io/name: mcp-myshows
spec:
  replicas: 1
  # Session token lives on an RWO PVC; avoid two pods racing the same file.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-myshows
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-myshows
    spec:
      containers:
        - name: mcp-myshows
          # renovate: datasource=docker depName=ghcr.io/lexfrei/mcp-myshows
          image: ghcr.io/lexfrei/mcp-myshows:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: MCP_HTTP_HOST
              value: 0.0.0.0
            - name: MCP_HTTP_PORT
              value: "8080"
          envFrom:
            # Carries MYSHOWS_USERNAME/PASSWORD and the mandatory MCP_HTTP_TOKEN.
            - secretRef:
                name: mcp-myshows-secrets
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            # TCP only: every HTTP request needs Authorization: Bearer.
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: session
              mountPath: /home/nobody/.mcp-myshows
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: session
          persistentVolumeClaim:
            claimName: mcp-myshows-session
