apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-myshows-secrets
  namespace: mcp-myshows
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: mcp-myshows-secrets
    creationPolicy: Owner
  data:
    - secretKey: MYSHOWS_USERNAME
      remoteRef:
        key: secret/data/mcp-myshows
        property: MYSHOWS_USERNAME
    - secretKey: MYSHOWS_PASSWORD
      remoteRef:
        key: secret/data/mcp-myshows
        property: MYSHOWS_PASSWORD
    # Mandatory: the server refuses to bind a non-loopback host without it.
    - secretKey: MCP_HTTP_TOKEN
      remoteRef:
        key: secret/data/mcp-myshows
        property: MCP_HTTP_TOKEN
