apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: lldap-secrets
  namespace: security
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: lldap-secrets
    creationPolicy: Owner
  data:
    - secretKey: LLDAP_LDAP_USER_PASS
      remoteRef:
        key: secret/data/lldap
        property: LLDAP_LDAP_USER_PASS
    - secretKey: LLDAP_JWT_SECRET
      remoteRef:
        key: secret/data/lldap
        property: LLDAP_JWT_SECRET
    - secretKey: LLDAP_KEY_SEED
      remoteRef:
        key: secret/data/lldap
        property: LLDAP_KEY_SEED
    - secretKey: LLDAP_USER_LEX_PASSWORD
      remoteRef:
        key: secret/data/lldap
        property: LLDAP_USER_LEX_PASSWORD
