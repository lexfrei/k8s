apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: node-ssh-tunnel-token
  namespace: cloudflared
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: node-ssh-tunnel-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: secret/data/cloudflare/node-ssh-tunnel-token
        property: token
