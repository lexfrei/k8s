apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: it-tools
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  parentRefs:
    # Attach via the dedicated ListenerSet to exercise the controller's
    # new ListenerSet support end-to-end (PR #326). Routing is functionally
    # equivalent to a direct Gateway parentRef thanks to the controller's
    # listener-hostname inheritance.
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: it-tools-listenerset
      namespace: cloudflare-tunnel-system
  hostnames:
    - tools.lex.la
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: it-tools
          port: 80
