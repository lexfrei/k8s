apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: it-tools
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  parentRefs:
    # Attach solely via the dedicated ListenerSet (PR #326). external-dns
    # follows the Kind=ListenerSet parentRef to the parent Gateway for the
    # DNS CNAME because the deployment runs with --gateway-listener-sets
    # (see argocd/infra/external-dns.yaml), so no direct Gateway parentRef
    # is needed.
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      name: it-tools-listenerset
      namespace: cloudflare-tunnel-system
  hostnames:
    - tools.lex.la
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: it-tools
          port: 80
