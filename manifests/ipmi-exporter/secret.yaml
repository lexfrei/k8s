apiVersion: v1
kind: Secret
metadata:
  name: ipmi-exporter
  namespace: monitoring
type: Opaque
stringData:
  # Local KCS access to the on-board HP iLO via /dev/ipmi0. No network,
  # no credentials. Pod is pinned to storage-01 via nodeSelector and
  # mounts /dev/ipmi0 as a hostPath device (see ArgoCD app values).
  # Was previously ExternalSecret pulling user/pass from OpenBao for
  # remote LAN_2_0 scrape against a BMC IP that has been unreachable
  # since at least early May 2026 (iLO ethernet not connected, DHCP
  # never assigned an IP).
  config.yml: |
    modules:
      default:
        driver: "OPEN"
        collectors:
          - bmc
          - ipmi
          - chassis
          - sel
