apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-transmission
  namespace: transmission-system
  labels:
    app.kubernetes.io/name: mcp-transmission
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-transmission
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-transmission
    spec:
      containers:
        - name: mcp-transmission
          image: ghcr.io/lexfrei/mcp-transmission:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: TRANSMISSION_URL
              value: http://transmission:9091/transmission/rpc
            - name: MCP_HTTP_HOST
              value: 0.0.0.0
            - name: MCP_HTTP_PORT
              value: "8080"
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
      securityContext:
        seccompProfile:
          type: RuntimeDefault
