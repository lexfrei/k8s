apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-rutracker-secrets
  namespace: mcp-rutracker
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: mcp-rutracker-secrets
    creationPolicy: Owner
  data:
    - secretKey: RUTRACKER_USERNAME
      remoteRef:
        key: secret/data/mcp-rutracker
        property: RUTRACKER_USERNAME
    - secretKey: RUTRACKER_PASSWORD
      remoteRef:
        key: secret/data/mcp-rutracker
        property: RUTRACKER_PASSWORD
