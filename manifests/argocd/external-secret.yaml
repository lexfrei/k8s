apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-dex-authelia
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: argocd-dex-authelia
    creationPolicy: Owner
    # ArgoCD only substitutes $<secret>:<key> in dex.config from secrets
    # carrying this label, so it must be templated onto the target.
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
  data:
    - secretKey: dex.authelia.clientSecret
      remoteRef:
        key: secret/data/authelia
        property: ARGOCD_CLIENT_SECRET
