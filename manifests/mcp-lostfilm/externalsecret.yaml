apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-lostfilm-secrets
  namespace: mcp-lostfilm
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: mcp-lostfilm-secrets
    creationPolicy: Owner
  data:
    - secretKey: LOSTFILM_EMAIL
      remoteRef:
        key: secret/data/mcp-lostfilm
        property: LOSTFILM_EMAIL
    - secretKey: LOSTFILM_PASSWORD
      remoteRef:
        key: secret/data/mcp-lostfilm
        property: LOSTFILM_PASSWORD
