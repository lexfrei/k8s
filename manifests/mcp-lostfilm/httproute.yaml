apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-lostfilm
  namespace: mcp-lostfilm
  annotations:
    internal-dns/hostname: lostfilm-mcp.home.lex.la
spec:
  parentRefs:
    - name: cilium-gateway-internal
      namespace: kube-system
      sectionName: https-home-lex-la
  hostnames:
    - lostfilm-mcp.home.lex.la
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mcp-lostfilm
          port: 8080
