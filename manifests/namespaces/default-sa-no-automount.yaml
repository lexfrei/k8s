# Disable auto-mounting of the API token on every namespace's default
# ServiceAccount (CIS 5.1.5 / least privilege). Pods that genuinely need
# the API token use a dedicated ServiceAccount (e.g. coredns) or opt back
# in with automountServiceAccountToken: true at the pod level.
# Applied via ServerSideApply, so it patches the k8s-created default SAs.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-options: Delete=false
automountServiceAccountToken: false
---
