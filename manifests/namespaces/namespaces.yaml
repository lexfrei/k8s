# Pod Security Standards labels for all namespaces.
#
# Phase A:
#   - 5 namespaces with known privileged workloads:
#     enforce/audit/warn = privileged
#   - 18 other namespaces: audit/warn = baseline (no enforce yet —
#     collect violations before turning it on in Phase B)
#
# Every Namespace carries argocd.argoproj.io/sync-options: Delete=false
# so that removing a line from this file never deletes the live namespace
# (which would take down workloads and ZFS-backed PVs). To decommission
# a namespace, remove its entry here then kubectl delete namespace <name>.
#
# Version (v1.35) pinned to current k3s PSA version for reproducibility.
# Bump when k3s upgrades to a new minor version.

# ===== Privileged namespaces (5) =====

---
apiVersion: v1
kind: Namespace
metadata:
  name: kube-system
  annotations:
    argocd.argoproj.io/sync-options: Delete=false
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: v1.35
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/audit-version: v1.35
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/warn-version: v1.35
---
