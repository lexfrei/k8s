apiVersion: apps/v1
kind: Deployment
metadata:
  name: wpad
  namespace: wpad
  labels:
    app: wpad
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wpad
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: wpad
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.31.2-alpine@sha256:054e14f543eb688809d59ec2ad1644d1a61678e247c87a318ad605977eb37eaf
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /wpad.dat
              port: http
              httpHeaders:
                - name: Host
                  value: wpad.home.lex.la
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /wpad.dat
              port: http
              httpHeaders:
                - name: Host
                  value: wpad.home.lex.la
            initialDelaySeconds: 5
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: pac
              mountPath: /usr/share/nginx/html/wpad.dat
              subPath: wpad.dat
            - name: conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: pac
          configMap:
            name: wpad
        - name: conf
          configMap:
            name: wpad
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
