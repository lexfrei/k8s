apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: github-ci-dashboard
spec:
  resyncPeriod: 2m
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  datasources:
    - inputName: "DS_GITHUB"
      datasourceName: "GitHub"
  json: |
    {
      "title": "GitHub CI — cozystack/cozystack",
      "uid": "github-ci-cozystack",
      "schemaVersion": 39,
      "editable": true,
      "time": { "from": "now-7d", "to": "now" },
      "refresh": "30m",
      "templating": {
        "list": [
          {
            "name": "workflow",
            "type": "custom",
            "label": "Workflow",
            "query": "pull-requests.yaml,pull-requests-release.yaml",
            "current": { "text": "pull-requests.yaml", "value": "pull-requests.yaml" },
            "options": [
              { "text": "pull-requests.yaml", "value": "pull-requests.yaml", "selected": true },
              { "text": "pull-requests-release.yaml", "value": "pull-requests-release.yaml", "selected": false }
            ]
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "barchart",
          "title": "Runs per day by conclusion ($workflow)",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "grafana-github-datasource", "uid": "${DS_GITHUB}" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "grafana-github-datasource", "uid": "${DS_GITHUB}" },
              "queryType": "Workflow_Runs",
              "owner": "cozystack",
              "repository": "cozystack",
              "options": { "workflow": "$workflow", "branch": "" }
            }
          ],
          "transformations": [
            {
              "id": "filterByValue",
              "options": { "type": "exclude", "match": "any", "filters": [
                { "fieldName": "conclusion", "config": { "id": "isNull" } },
                { "fieldName": "conclusion", "config": { "id": "equal", "options": { "value": "" } } }
              ] }
            },
            {
              "id": "convertFieldType",
              "options": { "conversions": [ { "targetField": "created_at", "destinationType": "string", "dateFormat": "YYYY-MM-DD" } ] }
            },
            {
              "id": "groupBy",
              "options": {
                "fields": {
                  "created_at": { "operation": "groupby", "aggregations": [] },
                  "conclusion": { "operation": "groupby", "aggregations": [] },
                  "id": { "operation": "aggregate", "aggregations": [ "count" ] }
                }
              }
            },
            {
              "id": "groupingToMatrix",
              "options": { "columnField": "conclusion", "rowField": "created_at", "valueField": "id (count)" }
            }
          ],
          "fieldConfig": {
            "defaults": { "custom": { "stacking": { "mode": "normal", "group": "A" }, "fillOpacity": 90 } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "success" },   "properties": [ { "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } } ] },
              { "matcher": { "id": "byName", "options": "failure" },   "properties": [ { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } } ] },
              { "matcher": { "id": "byName", "options": "cancelled" }, "properties": [ { "id": "color", "value": { "mode": "fixed", "fixedColor": "yellow" } } ] },
              { "matcher": { "id": "byName", "options": "skipped" },   "properties": [ { "id": "color", "value": { "mode": "fixed", "fixedColor": "blue" } } ] }
            ]
          },
          "options": { "stacking": "normal", "showValue": "auto", "legend": { "showLegend": true, "displayMode": "list", "placement": "bottom" } }
        },
        {
          "id": 2,
          "type": "piechart",
          "title": "Conclusion distribution (range)",
          "gridPos": { "h": 5, "w": 8, "x": 0, "y": 8 },
          "datasource": { "type": "grafana-github-datasource", "uid": "${DS_GITHUB}" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "grafana-github-datasource", "uid": "${DS_GITHUB}" },
              "queryType": "Workflow_Runs",
              "owner": "cozystack",
              "repository": "cozystack",
              "options": { "workflow": "$workflow", "branch": "" }
            }
          ],
          "transformations": [
            { "id": "filterByValue", "options": { "type": "exclude", "match": "any", "filters": [ { "fieldName": "conclusion", "config": { "id": "isNull" } }, { "fieldName": "conclusion", "config": { "id": "equal", "options": { "value": "" } } } ] } },
            {
              "id": "groupBy",
              "options": {
                "fields": {
                  "conclusion": { "operation": "groupby", "aggregations": [] },
                  "id": { "operation": "aggregate", "aggregations": ["count"] }
                }
              }
            },
            { "id": "rowsToFields", "options": { "mappings": [ { "fieldName": "conclusion", "handlerKey": "field.name" }, { "fieldName": "id (count)", "handlerKey": "field.value" } ] } }
          ],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "pieType": "donut", "legend": { "displayMode": "table", "placement": "right", "values": ["value", "percent"] } }
        },
        {
          "id": 3,
          "type": "table",
          "title": "Recent runs ($workflow)",
          "gridPos": { "h": 15, "w": 16, "x": 8, "y": 8 },
          "datasource": { "type": "grafana-github-datasource", "uid": "${DS_GITHUB}" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "grafana-github-datasource", "uid": "${DS_GITHUB}" },
              "queryType": "Workflow_Runs",
              "owner": "cozystack",
              "repository": "cozystack",
              "options": { "workflow": "$workflow", "branch": "" }
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": { "id": true, "name": true, "head_sha": true, "updated_at": true, "url": true, "workflow_id": true },
                "indexByName": {
                  "run_number": 0, "head_branch": 1, "status": 2, "conclusion": 3,
                  "event": 4, "run_started_at": 5, "created_at": 6, "html_url": 7
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "conclusion" },
                "properties": [
                  { "id": "mappings", "value": [
                    { "type": "value", "options": {
                      "success":   { "color": "green",  "index": 0 },
                      "failure":   { "color": "red",    "index": 1 },
                      "cancelled": { "color": "yellow", "index": 2 }
                    } }
                  ] },
                  { "id": "custom.cellOptions", "value": { "type": "color-text" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "html_url" },
                "properties": [ { "id": "custom.cellOptions", "value": { "type": "auto" } } ]
              }
            ]
          },
          "options": { "sortBy": [ { "displayName": "run_started_at", "desc": true } ] }
        },
        {
          "id": 4,
          "type": "barchart",
          "title": "Success vs failure ratio per day — decided runs ($workflow)",
          "description": "100%-stacked: green share = success rate, red = failure rate. Cancelled and in-progress runs excluded.",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 23 },
          "datasource": { "type": "grafana-github-datasource", "uid": "${DS_GITHUB}" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "grafana-github-datasource", "uid": "${DS_GITHUB}" },
              "queryType": "Workflow_Runs",
              "owner": "cozystack",
              "repository": "cozystack",
              "options": { "workflow": "$workflow", "branch": "" }
            }
          ],
          "transformations": [
            {
              "id": "filterByValue",
              "options": { "type": "include", "match": "all", "filters": [
                { "fieldName": "conclusion", "config": { "id": "regex", "options": { "value": "^(success|failure)$" } } }
              ] }
            },
            {
              "id": "convertFieldType",
              "options": { "conversions": [ { "targetField": "created_at", "destinationType": "string", "dateFormat": "YYYY-MM-DD" } ] }
            },
            {
              "id": "groupBy",
              "options": {
                "fields": {
                  "created_at": { "operation": "groupby", "aggregations": [] },
                  "conclusion": { "operation": "groupby", "aggregations": [] },
                  "id": { "operation": "aggregate", "aggregations": [ "count" ] }
                }
              }
            },
            {
              "id": "groupingToMatrix",
              "options": { "columnField": "conclusion", "rowField": "created_at", "valueField": "id (count)" }
            }
          ],
          "fieldConfig": {
            "defaults": { "custom": { "stacking": { "mode": "percent", "group": "A" }, "fillOpacity": 90 } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "success" }, "properties": [ { "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } } ] },
              { "matcher": { "id": "byName", "options": "failure" }, "properties": [ { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } } ] }
            ]
          },
          "options": { "stacking": "percent", "showValue": "auto", "legend": { "showLegend": true, "displayMode": "list", "placement": "bottom" } }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Avg run duration (success)",
          "description": "Mean wall-clock of successful runs over the selected range (updated_at − run_started_at).",
          "gridPos": { "h": 5, "w": 4, "x": 0, "y": 13 },
          "datasource": { "type": "grafana-github-datasource", "uid": "${DS_GITHUB}" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "grafana-github-datasource", "uid": "${DS_GITHUB}" },
              "queryType": "Workflow_Runs",
              "owner": "cozystack",
              "repository": "cozystack",
              "options": { "workflow": "$workflow", "branch": "" }
            }
          ],
          "transformations": [
            { "id": "filterByValue", "options": { "type": "include", "match": "all", "filters": [ { "fieldName": "conclusion", "config": { "id": "regex", "options": { "value": "^success$" } } } ] } },
            { "id": "convertFieldType", "options": { "conversions": [ { "targetField": "run_started_at", "destinationType": "number" }, { "targetField": "updated_at", "destinationType": "number" } ] } },
            { "id": "calculateField", "options": { "mode": "binary", "binary": { "left": "updated_at", "operator": "-", "right": "run_started_at" }, "alias": "duration", "replaceFields": false } },
            { "id": "filterFieldsByName", "options": { "include": { "names": [ "duration" ] } } }
          ],
          "fieldConfig": { "defaults": { "unit": "ms", "color": { "mode": "fixed", "fixedColor": "text" } }, "overrides": [] },
          "options": { "reduceOptions": { "calcs": [ "mean" ], "fields": "", "values": false }, "colorMode": "none", "graphMode": "none", "textMode": "value", "justifyMode": "center" }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Run duration over time ($workflow)",
          "description": "Per-run wall-clock duration (updated_at − run_started_at). Points; watch for the long-tail E2E outliers.",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 31 },
          "datasource": { "type": "grafana-github-datasource", "uid": "${DS_GITHUB}" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "grafana-github-datasource", "uid": "${DS_GITHUB}" },
              "queryType": "Workflow_Runs",
              "owner": "cozystack",
              "repository": "cozystack",
              "options": { "workflow": "$workflow", "branch": "" }
            }
          ],
          "transformations": [
            {
              "id": "convertFieldType",
              "options": { "conversions": [ { "targetField": "run_started_at", "destinationType": "number" }, { "targetField": "updated_at", "destinationType": "number" } ] }
            },
            {
              "id": "calculateField",
              "options": { "mode": "binary", "binary": { "left": "updated_at", "operator": "-", "right": "run_started_at" }, "alias": "duration", "replaceFields": false }
            },
            {
              "id": "organize",
              "options": { "excludeByName": { "id": true, "name": true, "head_branch": true, "head_sha": true, "updated_at": true, "run_started_at": true, "html_url": true, "url": true, "status": true, "conclusion": true, "event": true, "workflow_id": true, "run_number": true } }
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "ms", "custom": { "drawStyle": "points", "pointSize": 5, "lineWidth": 0, "showPoints": "always" } },
            "overrides": []
          },
          "options": { "legend": { "showLegend": false }, "tooltip": { "mode": "single", "sort": "none" } }
        },
        {
          "id": 7,
          "type": "gauge",
          "title": "Success rate",
          "description": "Successful runs as a share of all runs (billing cycle), parsed from the workflow usage API.",
          "gridPos": { "h": 5, "w": 4, "x": 4, "y": 13 },
          "datasource": { "type": "grafana-github-datasource", "uid": "${DS_GITHUB}" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "grafana-github-datasource", "uid": "${DS_GITHUB}" },
              "queryType": "Workflow_Usage",
              "owner": "cozystack",
              "repository": "cozystack",
              "options": { "workflow": "$workflow" }
            }
          ],
          "transformations": [
            { "id": "filterFieldsByName", "options": { "include": { "names": [ "successes" ] } } },
            { "id": "extractFields", "options": { "source": "successes", "format": "regexp", "regExp": "/(?<rate>[0-9.]+)%/" } },
            { "id": "convertFieldType", "options": { "conversions": [ { "targetField": "rate", "destinationType": "number" } ] } },
            { "id": "filterFieldsByName", "options": { "include": { "names": [ "rate" ] } } }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent", "min": 0, "max": 100,
              "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "yellow", "value": 50 }, { "color": "green", "value": 80 } ] }
            },
            "overrides": []
          },
          "options": { "reduceOptions": { "calcs": [ "lastNotNull" ], "fields": "", "values": false }, "showThresholdLabels": false, "showThresholdMarkers": true }
        }
      ]
    }
