apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-secrets
  namespace: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: openclaw-secrets
    creationPolicy: Owner
  data:
    - secretKey: openai_api_key
      remoteRef:
        key: secret/data/openclaw
        property: openai_api_key
    - secretKey: telegram_bot_token
      remoteRef:
        key: secret/data/openclaw
        property: telegram_bot_token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-awg-config
  namespace: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: openclaw-awg-config
    creationPolicy: Owner
  data:
    - secretKey: wg0.conf
      remoteRef:
        key: secret/data/openclaw/awg-config
        property: wg0.conf
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-oauth2-proxy
  namespace: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: openclaw-oauth2-proxy
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: secret/data/openclaw/oauth2-proxy
        property: client-secret
    - secretKey: cookie-secret
      remoteRef:
        key: secret/data/openclaw/oauth2-proxy
        property: cookie-secret
