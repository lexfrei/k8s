apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-storage-01
      dnsPolicy: ClusterFirst
      initContainers:
        - name: fix-permissions
          image: ghcr.io/openclaw/openclaw:latest
          command: ["sh", "-c", "chown --recursive 1000:1000 /home/node/.openclaw"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
      containers:
        - name: amneziawg
          image: ghcr.io/zeozeozeo/amneziawg-client:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              #!/bin/sh
              set -e
              PREFIX="awg-oc"
              IFACE_FILE="/run/awg/interface-name"
              CONFIG_DIR="/run/awg"
              LOCK_DIR="/tmp/awg-locks"
              RESOLV_BACKUP="/run/awg/resolv.conf.bak"

              mkdir -p "$LOCK_DIR"

              find_and_reserve_interface() {
                N=0
                while true; do
                  LOCK_FILE="$LOCK_DIR/${PREFIX}${N}.lock"
                  if (set -C; echo $$ > "$LOCK_FILE") 2>/dev/null; then
                    if ! ip link show "${PREFIX}${N}" >/dev/null 2>&1; then
                      echo "${PREFIX}${N}"
                      return 0
                    fi
                    rm -f "$LOCK_FILE"
                  fi
                  N=$((N + 1))
                  if [ "$N" -gt 100 ]; then
                    echo "ERROR: Could not find available interface number" >&2
                    return 1
                  fi
                done
              }

              process_awg_config() {
                src_conf="$1"
                dst_conf="$2"
                addr_file="$3"
                grep -i "^Address" "$src_conf" | sed 's/^[Aa]ddress[[:space:]]*=[[:space:]]*//' > "$addr_file" || true
                grep -vEi "^[[:space:]]*(Address|DNS|MTU|Table|PreUp|PostUp|PreDown|PostDown|SaveConfig)[[:space:]]*=" "$src_conf" > "$dst_conf" || true
              }

              apply_addresses() {
                iface="$1"
                addr_file="$2"
                if [ -s "$addr_file" ]; then
                  while IFS=',' read -r addr_list; do
                    for addr in $addr_list; do
                      addr=$(echo "$addr" | tr -d ' ')
                      [ -n "$addr" ] && ip addr add "$addr" dev "$iface" 2>/dev/null || true
                    done
                  done < "$addr_file"
                fi
              }

              backup_resolv() {
                [ -f /etc/resolv.conf ] && cp /etc/resolv.conf "$RESOLV_BACKUP"
              }

              restore_resolv() {
                [ -f "$RESOLV_BACKUP" ] && cat "$RESOLV_BACKUP" > /etc/resolv.conf 2>/dev/null || true
              }

              IFACE=$(find_and_reserve_interface)
              if [ -z "$IFACE" ]; then
                exit 1
              fi

              echo "$IFACE" > "$IFACE_FILE"
              echo "Using AWG interface: $IFACE"

              ADDR_FILE="${CONFIG_DIR}/${IFACE}.addr"

              for conf in /config/*.conf; do
                if [ -f "$conf" ]; then
                  process_awg_config "$conf" "${CONFIG_DIR}/${IFACE}.conf" "$ADDR_FILE"
                  break
                fi
              done

              backup_resolv

              if ip link add dev "$IFACE" type amneziawg 2>/dev/null; then
                echo "Using kernel module"
                ip link set "$IFACE" up
                awg setconf "$IFACE" "${CONFIG_DIR}/${IFACE}.conf"
                apply_addresses "$IFACE" "$ADDR_FILE"
              else
                echo "Kernel module unavailable, using userspace implementation"
                amneziawg-go "$IFACE" &
                sleep 1
                ip link set "$IFACE" up
                awg setconf "$IFACE" "${CONFIG_DIR}/${IFACE}.conf"
                apply_addresses "$IFACE" "$ADDR_FILE"
              fi

              setup_routing() {
                iface="$1"
                conf_file="$2"

                WG_ENDPOINT=$(grep -i "^Endpoint" "$conf_file" 2>/dev/null | head -1 | sed 's/^[Ee]ndpoint[[:space:]]*=[[:space:]]*//' | cut -d: -f1)

                if [ -n "$WG_ENDPOINT" ]; then
                  if ! echo "$WG_ENDPOINT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
                    echo "Resolving endpoint hostname: $WG_ENDPOINT"
                    WG_ENDPOINT_IP=$(getent hosts "$WG_ENDPOINT" | awk '{print $1}' | head -1)
                    if [ -n "$WG_ENDPOINT_IP" ]; then
                      echo "Resolved $WG_ENDPOINT -> $WG_ENDPOINT_IP"
                      WG_ENDPOINT="$WG_ENDPOINT_IP"
                    else
                      echo "ERROR: Cannot resolve endpoint hostname $WG_ENDPOINT"
                      return 1
                    fi
                  fi
                fi

                ORIG_GW=$(ip route | grep '^default via' | awk '{print $3}' | head -1)

                if grep -qi "^AllowedIPs.*0\.0\.0\.0/0" "$conf_file" 2>/dev/null; then
                  FULL_TUNNEL="yes"
                  echo "Full tunnel mode detected"
                else
                  FULL_TUNNEL="no"
                  echo "Split tunnel mode detected"
                fi

                echo "Routing: endpoint=$WG_ENDPOINT gateway=$ORIG_GW full_tunnel=$FULL_TUNNEL"

                if [ -n "$WG_ENDPOINT" ] && [ -n "$ORIG_GW" ]; then
                  ip route add "$WG_ENDPOINT" via "$ORIG_GW" 2>/dev/null || true

                  if [ "$FULL_TUNNEL" = "yes" ]; then
                    ip route replace default dev "$iface"
                    echo "Default route via $iface, endpoint $WG_ENDPOINT via $ORIG_GW"
                  else
                    ALLOWED_IPS=$(grep -i "^AllowedIPs" "$conf_file" 2>/dev/null | sed 's/^[Aa]llowed[Ii][Pp]s[[:space:]]*=[[:space:]]*//')
                    echo "$ALLOWED_IPS" | tr ',' '\n' | while read -r subnet; do
                      subnet=$(echo "$subnet" | tr -d ' ')
                      [ -z "$subnet" ] && continue
                      echo "$subnet" | grep -q ':' && continue
                      [ "$subnet" = "0.0.0.0/0" ] && continue
                      ip route add "$subnet" dev "$iface" 2>/dev/null || true
                    done
                  fi
                fi
              }

              for conf in /config/*.conf; do
                if [ -f "$conf" ]; then
                  setup_routing "$IFACE" "$conf"
                  break
                fi
              done

              restore_resolv

              exec sleep infinity
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |-
                    IFACE=$(cat /run/awg/interface-name 2>/dev/null || echo "")
                    if [ -n "$IFACE" ]; then
                      ip link set "$IFACE" down 2>/dev/null || true
                      ip link delete "$IFACE" 2>/dev/null || true
                      pkill -f "amneziawg-go $IFACE" 2>/dev/null || true
                    fi
          securityContext:
            privileged: true
            runAsNonRoot: false
            runAsUser: 0
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: awg-config
              mountPath: /config
              readOnly: true
            - name: awg-runtime
              mountPath: /run/awg
            - name: tun-device
              mountPath: /dev/net/tun

        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          ports:
            - containerPort: 18789
              name: gateway
              protocol: TCP
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: openai_api_key
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: telegram_bot_token
            - name: OPENCLAW_GATEWAY_BIND
              value: lan
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi

        - name: oauth2-proxy
          # renovate: datasource=docker depName=quay.io/oauth2-proxy/oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0
          args:
            - --http-address=0.0.0.0:4180
            - --upstream=http://localhost:18789
            - --provider=oidc
            - --oidc-issuer-url=https://authelia.lex.la
            - --client-id=openclaw
            - --email-domain=*
            - --cookie-secure=true
            - --cookie-domain=.lex.la
            - --cookie-name=_openclaw_oauth2
            - --redirect-url=https://oc.lex.la/oauth2/callback
            - --skip-provider-button=true
            - --code-challenge-method=S256
            - --scope=openid profile email groups
            - --allowed-group=admins
          ports:
            - containerPort: 4180
              name: http
              protocol: TCP
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: openclaw-oauth2-proxy
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: openclaw-oauth2-proxy
                  key: cookie-secret
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 3
            periodSeconds: 10

      volumes:
        - name: awg-config
          secret:
            secretName: openclaw-awg-config
        - name: awg-runtime
          emptyDir:
            medium: Memory
        - name: tun-device
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-data
