apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw
  namespace: openclaw
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openclaw-full
  namespace: openclaw
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-full
  namespace: openclaw
subjects:
  - kind: ServiceAccount
    name: openclaw
    namespace: openclaw
roleRef:
  kind: Role
  name: openclaw-full
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-readonly
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-readonly
subjects:
  - kind: ServiceAccount
    name: openclaw
    namespace: openclaw
roleRef:
  kind: ClusterRole
  name: openclaw-readonly
  apiGroup: rbac.authorization.k8s.io
