apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
  namespace: claude-workspace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"lexfrei","password":"{{ .ghcr_token }}","auth":"{{ printf "lexfrei:%s" .ghcr_token | b64enc }}"}}}
  data:
    - secretKey: ghcr_token
      remoteRef:
        key: secret/data/claude-workspace
        property: ghcr_token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-secrets
  namespace: claude-workspace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy-secrets
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: secret/data/claude-workspace
        property: oauth2_proxy_client_secret
    - secretKey: cookie-secret
      remoteRef:
        key: secret/data/claude-workspace
        property: oauth2_proxy_cookie_secret
