apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: claude-workspace
  namespace: claude-workspace
spec:
  parentRefs:
    - name: cilium-gateway-internal
      namespace: kube-system
      sectionName: https-home-lex-la
  hostnames:
    - claude.home.lex.la
  rules:
    - backendRefs:
        - name: claude-workspace
          port: 8080
