apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: claude-workspace-public
  namespace: claude-workspace
  annotations:
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  parentRefs:
    - name: cloudflare-tunnel
      namespace: cloudflare-tunnel-system
  hostnames:
    - code.lex.la
  rules:
    - backendRefs:
        - name: claude-workspace
          port: 4180
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: claude-workspace-internal
  namespace: claude-workspace
spec:
  parentRefs:
    - name: cilium-gateway-internal
      namespace: kube-system
      sectionName: https-lex-la
  hostnames:
    - code.lex.la
  rules:
    - backendRefs:
        - name: claude-workspace
          port: 4180
