apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-workspace
  namespace: claude-workspace
  labels:
    app: claude-workspace
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: claude-workspace
  template:
    metadata:
      labels:
        app: claude-workspace
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      nodeSelector:
        kubernetes.io/hostname: k8s-storage-01
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: fix-permissions
          image: ghcr.io/lexfrei/claude-workspace:latest
          command: ["sh", "-c", "chown --recursive 1000:1000 /home/dev"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: home
              mountPath: /home/dev
      containers:
        - name: workspace
          image: ghcr.io/lexfrei/claude-workspace:latest
          ports:
            - containerPort: 8080
              name: vscode
              protocol: TCP
          volumeMounts:
            - name: home
              mountPath: /home/dev
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

        - name: oauth2-proxy
          # renovate: datasource=docker depName=quay.io/oauth2-proxy/oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0
          args:
            - --http-address=0.0.0.0:4180
            - --upstream=http://localhost:8080
            - --provider=oidc
            - --oidc-issuer-url=https://authelia.lex.la
            - --client-id=claude-workspace
            - --email-domain=*
            - --cookie-secure=true
            - --cookie-domain=.lex.la
            - --cookie-name=_claude_workspace_oauth2
            - --redirect-url=https://code.lex.la/oauth2/callback
            - --skip-provider-button=true
            - --code-challenge-method=S256
            - --scope=openid profile email groups
            - --allowed-group=admins
          ports:
            - containerPort: 4180
              name: http
              protocol: TCP
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: cookie-secret
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 3
            periodSeconds: 10

      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: claude-workspace-home
