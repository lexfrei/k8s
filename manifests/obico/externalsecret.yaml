apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: obico-secrets
  namespace: obico
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: obico-secrets
    creationPolicy: Owner
  data:
    - secretKey: DJANGO_SECRET_KEY
      remoteRef:
        key: secret/data/obico
        property: DJANGO_SECRET_KEY
