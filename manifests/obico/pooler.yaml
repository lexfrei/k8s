apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: obico-db-pooler
  namespace: obico
spec:
  cluster:
    name: obico-db
  instances: 1
  # rw: route to the primary. Obico writes on every request, so a read-only
  # pooler would not help.
  type: rw
  pgbouncer:
    # transaction mode is required here, NOT session. Obico holds connections open
    # (Django CONN_MAX_AGE=600), so under session mode every idle client connection
    # pins one server connection and the pool exhausts at zero query load (the app
    # keeps ~15 idle connections). Transaction mode holds a server connection only
    # for the duration of a transaction, so idle clients cost nothing and real
    # demand (a handful of concurrent transactions) fits easily.
    # Safe here: Channels runs on Redis (no Postgres LISTEN/NOTIFY) and the app code
    # uses no server-side cursors (no QuerySet.iterator()).
    poolMode: transaction
    parameters:
      max_client_conn: "200"
      default_pool_size: "25"
