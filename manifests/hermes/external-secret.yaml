apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-secrets
  namespace: hermes
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: hermes-secrets
    creationPolicy: Owner
  data:
    # Telegram gateway bot token (long-poll, outbound only). The LLM provider
    # (openai-codex) authenticates interactively via `hermes auth` and stores
    # its credentials in the PVC, so there is no LLM API key here.
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: secret/data/hermes
        property: TELEGRAM_BOT_TOKEN
