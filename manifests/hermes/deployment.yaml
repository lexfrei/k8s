apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
spec:
  # Single writer: HERMES_HOME (/opt/data) holds SQLite memory + config and
  # must not be shared. Recreate avoids two pods touching the same RWO PVC
  # during a rollout.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
    spec:
      # The agent talks to the Kubernetes API for nothing; withholding the
      # token shrinks the blast radius of its in-container terminal/browser
      # tools.
      automountServiceAccountToken: false
      # zfs-localpv is node-local; pin to the storage node so a reschedule
      # cannot strand the pod away from its volume.
      nodeSelector:
        kubernetes.io/hostname: k8s-storage-01
      containers:
        - name: hermes
          # renovate: datasource=docker depName=nousresearch/hermes-agent
          image: nousresearch/hermes-agent:v2026.7.7@sha256:ce3b39adf33fffae8cb19dcae74f971975b972efe91207f7d7539f80a0aae66a
          imagePullPolicy: IfNotPresent
          # Entrypoint is s6-overlay (/init → main-wrapper.sh); it runs
          # cont-init (config migration, skills sync) then execs
          # `hermes <args>` as the unprivileged hermes user. Pass the
          # subcommand only — do NOT override command, or s6 init is skipped.
          args: ["gateway", "run"]
          env:
            # Refuse to serve any Telegram chat that is not explicitly
            # allowlisted (set platforms.telegram.allowed_chats in
            # /opt/data/config.yaml after first boot).
            - name: GATEWAY_ALLOW_ALL_USERS
              value: "false"
          envFrom:
            - secretRef:
                name: hermes-secrets
          volumeMounts:
            - name: data
              mountPath: /opt/data
            # See configmap.yaml: restores the venv PATH that /etc/profile
            # wipes out for non-root login shells, which otherwise breaks
            # the terminal tool's bash -l session-snapshot capture.
            - name: profile-fix
              mountPath: /etc/profile.d/00-hermes-venv-path.sh
              subPath: 00-hermes-venv-path.sh
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          securityContext:
            # The image starts as root for s6-overlay (fix-attrs, chown of the
            # data volume, then drops to the hermes user via s6-setuidgid).
            # Forcing runAsNonRoot / readOnlyRootFilesystem / drop-all-caps
            # breaks that init sequence, so they are intentionally left off.
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: profile-fix
          configMap:
            name: hermes-profile-fix
