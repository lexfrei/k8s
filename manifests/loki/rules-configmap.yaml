apiVersion: v1
kind: ConfigMap
metadata:
  # Mounted by the Loki singleBinary StatefulSet at /etc/loki/rules/fake
  # (tenant id is "fake" when auth_enabled=false). The Loki ruler reads
  # all .yaml files under that directory and forwards firing alerts to
  # vmalertmanager. Adding/removing rule files only needs an ArgoCD sync —
  # Loki reloads rules on configmap change without a pod restart (the
  # ruler watches the directory). Adding NEW files may require a restart
  # if the mount cache lags; sync the loki app then `kubectl rollout
  # restart sts loki` if a new file doesn't appear in the ruler logs
  # within ~1 minute.
  name: loki-rules
  namespace: monitoring
data:
  ilo.yaml: |
    groups:
      - name: ilo-syslog
        interval: 30s
        rules:
          - alert: iLOSyslogEvent
            # iLO Gen8 emits ~11 events/month on this host (verified from
            # 172-day SEL backup pre-cleanup). Firing on ANY event is not
            # noisy — Alertmanager group_interval will dedupe bursts. The
            # alertmanager Telegram template only renders .Annotations.summary,
            # so the count is folded into the summary itself.
            expr: sum(count_over_time({job="ilo-syslog"}[5m])) > 0
            for: 0m
            labels:
              severity: info
              source: ilo
            annotations:
              summary: 'iLO: {{ $value }} syslog event(s) in the last 5 minutes'
              description: |
                {{ $value }} event(s) from iLO BMC in the last 5 minutes.
                Inspect in Loki:
                  {job="ilo-syslog"}
