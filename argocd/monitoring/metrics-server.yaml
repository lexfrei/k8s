apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: monitoring
  destination:
    namespace: kube-system
    server: "https://kubernetes.default.svc"
  sources:
    - repoURL: "https://kubernetes-sigs.github.io/metrics-server/"
      targetRevision: "3.13.1"
      chart: metrics-server
      helm:
        valuesObject:
          metrics:
            enabled: true

          serviceMonitor:
            enabled: true

          # Requests lift metrics-server out of BestEffort QoS.
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 192Mi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
