apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: monitoring
  destination:
    namespace: monitoring
    server: "https://kubernetes.default.svc"
  sources:
    - repoURL: "https://grafana.github.io/helm-charts"
      targetRevision: "7.0.0"
      chart: loki
      helm:
        valuesObject:
          deploymentMode: SingleBinary
          loki:
            auth_enabled: false
            commonConfig:
              replication_factor: 1
            storage:
              type: filesystem
              bucketNames:
                chunks: chunks
                ruler: ruler
                admin: admin
            schemaConfig:
              configs:
                - from: "2024-01-01"
                  store: tsdb
                  object_store: filesystem
                  schema: v13
                  index:
                    prefix: loki_index_
                    period: 24h
            limits_config:
              retention_period: 24h
              split_queries_by_interval: 1h
              retention_stream:
                - selector: '{job="systemd-journal"}'
                  priority: 1
                  period: 336h
            compactor:
              retention_enabled: true
              retention_delete_delay: 1h
              delete_request_cancel_period: 10m
              delete_request_store: filesystem
            # Ruler evaluates LogQL alerting rules and forwards firing
            # alerts to vmalertmanager — same delivery as VMRule alerts,
            # so log-based alerts land in the same Telegram channel.
            # Rules come from a ConfigMap mounted at /etc/loki/rules/fake
            # (tenant id is "fake" with auth_enabled=false).
            rulerConfig:
              alertmanager_url: "http://vmalertmanager-vmalertmanager.monitoring.svc:9093"
              enable_alertmanager_v2: true
              evaluation_interval: 30s
              poll_interval: 1m
              storage:
                type: local
                local:
                  directory: /etc/loki/rules
              rule_path: /tmp/loki/scratch
              wal:
                dir: /var/loki/ruler-wal
            structuredConfig:
              ingester:
                chunk_idle_period: 2h
                chunk_retain_period: 1m
                chunk_block_size: 262144
                flush_check_period: 30s
              query_range:
                align_queries_with_step: true
                cache_results: true
                results_cache:
                  cache:
                    embedded_cache:
                      enabled: true
                      max_size_mb: 50
              chunk_store_config:
                chunk_cache_config:
                  embedded_cache:
                    enabled: true
                    max_size_mb: 100
          singleBinary:
            replicas: 1
            nodeSelector:
              kubernetes.io/hostname: k8s-storage-01
            persistence:
              enabled: true
              size: 10Gi
              storageClass: zfs-localpv
              whenScaled: Retain
              whenDeleted: Retain
            podSecurityContext:
              fsGroup: 10001
              fsGroupChangePolicy: OnRootMismatch
              runAsGroup: 10001
              runAsNonRoot: true
              runAsUser: 10001
            resources:
              requests:
                cpu: 100m
                memory: 384Mi
              limits:
                cpu: 500m
                memory: 768Mi
            # Mount the loki-rules ConfigMap so the ruler can load
            # LogQL-based alerts (see manifests/loki/rules-configmap.yaml).
            extraVolumes:
              - name: loki-rules
                configMap:
                  name: loki-rules
            extraVolumeMounts:
              - name: loki-rules
                mountPath: /etc/loki/rules/fake
          # Disable components not needed in SingleBinary mode
          read:
            replicas: 0
          backend:
            replicas: 0
          write:
            replicas: 0
          # Disable other components
          gateway:
            enabled: false
          chunksCache:
            enabled: false
          resultsCache:
            enabled: false
          monitoring:
            selfMonitoring:
              enabled: false
              grafanaAgent:
                installOperator: false
            lokiCanary:
              enabled: false
          test:
            enabled: false
          # The rules sidecar (loki-sc-rules) shipped with no resources at
          # all. Observed steady-state ~75Mi; no CPU limit (avoid throttling),
          # memory limit gives generous headroom.
          sidecar:
            resources:
              requests:
                cpu: 25m
                memory: 96Mi
              limits:
                memory: 256Mi
    - repoURL: https://github.com/lexfrei/k8s.git
      targetRevision: HEAD
      path: manifests/loki
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
