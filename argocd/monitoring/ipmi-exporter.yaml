apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ipmi-exporter
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: monitoring
  destination:
    namespace: monitoring
    server: "https://kubernetes.default.svc"
  sources:
    - repoURL: "https://prometheus-community.github.io/helm-charts"
      targetRevision: "0.8.0"
      chart: prometheus-ipmi-exporter
      helm:
        valuesObject:
          clusterDomain: k8s.home.lex.la
          # FreeIPMI native interface so the exporter does not shell out
          # to ipmitool; combined with driver=OPEN in the config Secret
          # this hits the on-board iLO via the kernel KCS device.
          nativeIPMI:
            enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          configSecret:
            enabled: true
            name: ipmi-exporter
            key: config.yml
          scrapeConfig:
            enabled: true
            # local mode: VictoriaMetrics scrapes the exporter's /metrics
            # directly (the exporter does its own IPMI query against the
            # local BMC); no remote target list, no /ipmi?target= relabel.
            mode: local
            modules:
              - default
            scrapeInterval: 1m
            scrapeTimeout: 30s
            scheme: HTTP
            # Chart template requires staticConfigs or fileSDConfigs
            # even when mode=local, where targets are irrelevant. Point
            # at the exporter's own Service so the template renders.
            staticConfigs:
              - targets:
                  - "ipmi-exporter-prometheus-ipmi-exporter.monitoring.svc:9290"
          # Pin to the storage node because /dev/ipmi0 is only on that
          # host. If a second BMC-bearing node ever joins, convert to a
          # DaemonSet (chart does not support that out of the box; would
          # require a separate Deployment per host or a custom kustomize).
          nodeSelector:
            kubernetes.io/hostname: k8s-storage-01
          # /dev/ipmi0 is a chardev whose IOCTLs go through the OpenIPMI
          # kernel driver. go-ipmi's native KCS implementation actually
          # bypasses /dev/ipmi0 and talks to the BMC via raw port I/O
          # (in/out instructions at I/O ports 0xCA2/0xCA3 on this board),
          # which requires CAP_SYS_RAWIO plus the kernel `iopl()`/`ioperm()`
          # facility — that only resolves cleanly with privileged: true
          # under the standard runtime. monitoring namespace is already on
          # PSS privileged, so this does not regress isolation.
          containerSecurityContext:
            privileged: true
            runAsUser: 0
            runAsNonRoot: false
          extraVolumes:
            - name: ipmi-device
              hostPath:
                path: /dev/ipmi0
                type: CharDevice
          extraVolumeMounts:
            - name: ipmi-device
              mountPath: /dev/ipmi0
    - repoURL: https://github.com/lexfrei/k8s.git
      targetRevision: HEAD
      path: manifests/ipmi-exporter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
