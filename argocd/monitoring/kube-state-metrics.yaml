apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-state-metrics
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: monitoring
  destination:
    namespace: monitoring
    server: "https://kubernetes.default.svc"
  source:
    repoURL: "https://prometheus-community.github.io/helm-charts"
    targetRevision: "7.8.1"
    chart: kube-state-metrics
    helm:
      valuesObject:
        prometheus:
          monitor:
            enabled: true
        # Requests lift kube-state-metrics out of BestEffort QoS.
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 192Mi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
