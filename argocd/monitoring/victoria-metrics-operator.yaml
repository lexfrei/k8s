apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: monitoring
  destination:
    namespace: monitoring
    server: "https://kubernetes.default.svc"
  source:
    repoURL: "https://victoriametrics.github.io/helm-charts/"
    targetRevision: "0.66.3"
    chart: victoria-metrics-operator
    helm:
      valuesObject:
        # Chart 0.65.x reads the operator deployment's resources from the
        # top-level `resources:` key. The previous `operator.resources` was
        # silently ignored, so the rendered pod had no resources at all.
        # No CPU limit (avoid throttling); memory limit gives generous
        # headroom over observed steady-state usage (~45Mi).
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
