apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openbao
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: security
  destination:
    namespace: security
    server: "https://kubernetes.default.svc"
  sources:
    - repoURL: "https://openbao.github.io/openbao-helm"
      targetRevision: "0.28.4"
      chart: openbao
      helm:
        valuesObject:
          global:
            enabled: true

          injector:
            enabled: false

          server:
            image:
              repository: "openbao/openbao"
              tag: "2.4.4"

            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi

            # Liveness only catches a truly hung process. sealedcode/uninitcode
            # are forced to 200 so a (transient, auto-unsealed) sealed state is
            # NOT treated as failure — a misread here would restart-loop the
            # single secrets backend for the whole cluster. Generous delay +
            # failureThreshold=5 (50s) avoids restarts on brief stalls.
            livenessProbe:
              enabled: true
              path: "/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"
              initialDelaySeconds: 60
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5

            standalone:
              enabled: true
              config: |
                ui = true

                listener "tcp" {
                  tls_disable = 1
                  address = "[::]:8200"
                  cluster_address = "[::]:8201"
                }

                storage "file" {
                  path = "/openbao/data"
                }

                seal "static" {
                  current_key_id = "openbao-homelab-v1"
                  current_key    = "file:///openbao/seal/unseal-key"
                }

            dataStorage:
              enabled: true
              size: 5Gi
              storageClass: zfs-localpv
              accessMode: ReadWriteOnce

            volumes:
              - name: seal-key
                secret:
                  secretName: openbao-seal-key

            volumeMounts:
              - name: seal-key
                mountPath: /openbao/seal
                readOnly: true

            service:
              enabled: true
              type: ClusterIP
              port: 8200

            ha:
              enabled: false


          ui:
            enabled: true
            serviceType: ClusterIP

    - repoURL: https://github.com/lexfrei/k8s.git
      targetRevision: HEAD
      path: manifests/openbao

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
