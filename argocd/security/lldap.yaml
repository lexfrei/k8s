apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lldap
  namespace: argocd
  annotations:
    # The managedFieldsManagers ignoreDifferences below only takes effect
    # under server-side diff. Enable it for this app so ESO- and
    # Cilium-defaulted fields are compared by field ownership (via the
    # apiserver) instead of client-side, where they always read as drift.
    argocd.argoproj.io/compare-options: ServerSideDiff=true
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: security
  destination:
    namespace: security
    server: "https://kubernetes.default.svc"
  source:
    repoURL: "https://github.com/lexfrei/k8s.git"
    targetRevision: HEAD
    path: manifests/lldap
  # ESO and the Cilium gateway controller server-side default fields that
  # git does not declare (ExternalSecret data[*].remoteRef.*Strategy and
  # target.deletionPolicy; HTTPRoute parentRefs.group/kind and
  # backendRefs.group/kind/weight). Each of those fields is owned by the
  # respective controller's field manager, so ignore the diffs they
  # introduce — otherwise the app reports OutOfSync on every reconcile and
  # selfHeal cannot converge.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      managedFieldsManagers:
        - external-secrets
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      managedFieldsManagers:
        - cilium-operator-generic
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
