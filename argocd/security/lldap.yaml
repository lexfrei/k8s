apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lldap
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: security
  destination:
    namespace: security
    server: "https://kubernetes.default.svc"
  source:
    repoURL: "https://github.com/lexfrei/k8s.git"
    targetRevision: HEAD
    path: manifests/lldap
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      # ServerSideApply alone fixes write-path (field ownership) but
      # ArgoCD still computes diff client-side, so controller- and
      # apiserver-defaulted fields (ESO data[*].remoteRef.*Strategy,
      # HTTPRoute parentRefs.group/kind, etc.) re-trigger OutOfSync
      # on every reconcile. ServerSideDiff routes diff through the
      # apiserver dry-run and respects field ownership.
      - ServerSideDiff=true
