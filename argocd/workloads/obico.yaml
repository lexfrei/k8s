apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: obico
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: workloads
  destination:
    namespace: obico
    server: "https://kubernetes.default.svc"
  sources:
    # Upstream chart, contributed from lexfrei/charts and now maintained in the
    # obico-server repo. It is not published to any Helm registry, so consume it
    # straight from git; "release" is the deploy branch the images are built from.
    - repoURL: https://github.com/TheSpaghettiDetective/obico-server.git
      targetRevision: release
      path: charts/obico
      helm:
        valuesObject:
          image:
            # The chart defaults to the moving "release" tag; pin the CalVer the
            # build-images workflow published so upgrades are deliberate.
            web:
              tag: "2026.7.9"
            mlApi:
              cpu:
                tag: "2026.7.9"
          obico:
            siteUsesHttps: true
            existingSecret: obico-secrets
            extraEnv:
              ACCOUNT_ALLOW_SIGN_UP: "False"
          database:
            # Point at the CNPG Pooler (PgBouncer) service instead of the cluster
            # -rw service. DATABASE_URL is composed from these parts; the password
            # is injected at runtime from the CNPG-managed app secret.
            host: obico-db-pooler
            port: 5432
            name: obico
            user: obico
            passwordSecret: obico-db-app
            passwordSecretKey: password
          mlApi:
            enabled: true
          tasks:
            # The post-print compile_timelapse task runs ffmpeg/libx264 on the
            # collected 720p detection frames; at the chart-default 512Mi limit
            # the encoder is OOM-killed (SIGKILL) on every compile, so prints
            # never get their server-side timelapse. CPU raised alongside so
            # the encode is not throttled into minutes. Request matches the
            # observed steady state (~700Mi VPA target); VPA scales limits
            # proportionally to the limit/request ratio, so keep it modest.
            resources:
              requests:
                memory: "512Mi"
                cpu: "100m"
              limits:
                memory: "2Gi"
                cpu: "1"
          redis:
            # Observed usage sits flat at ~250Mi — right at the chart-default
            # 256Mi limit, so give it real headroom.
            resources:
              requests:
                memory: "256Mi"
                cpu: "50m"
              limits:
                memory: "512Mi"
                cpu: "200m"
          persistence:
            data:
              storageClassName: zfs-localpv
            media:
              # Static ZFS dataset (pool/obico-media) so Samba can export the
              # timelapses from the host; PV/PVC in manifests/obico/media-pv.yaml.
              existingClaim: obico-media-static
          httpRoute:
            enabled: true
            parentRefs:
              - name: cilium-gateway-internal
                namespace: kube-system
                sectionName: https-home-lex-la
            hostnames:
              - obico.home.lex.la
    - repoURL: https://github.com/lexfrei/k8s.git
      targetRevision: HEAD
      path: manifests/obico
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
