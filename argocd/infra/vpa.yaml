apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vpa
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    namespace: vpa-system
    server: "https://kubernetes.default.svc"
  sources:
    - repoURL: "ghcr.io/stevehipwell/helm-charts"
      targetRevision: "1.12.0"
      chart: vertical-pod-autoscaler
      helm:
        valuesObject:
          serviceMonitor:
            enabled: true
          recommender:
            # History persistence relies on the default checkpoint mechanism
            # (VerticalPodAutoscalerCheckpoint objects). --storage=prometheus is
            # unusable in VPA 1.7.0: the release ships with the history metric
            # names unwired (kubernetes/autoscaler#9747), so the query goes out
            # without a metric name and any backend rejects it with duplicate
            # series. Fixed upstream for 1.7.1; not worth restoring even then —
            # checkpoints survive restarts without an external dependency.
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi
          updater:
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 256Mi
          admissionController:
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 128Mi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
