apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-tunnel-gateway-controller
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    namespace: cloudflare-tunnel-system
    server: "https://kubernetes.default.svc"
  sources:
    # OVERRIDE: PR #244 feature build (HTTPRouteBackendProtocolWebSocket).
    # Points at the PR's published chart so the new appProtocol ws/wss
    # support is exercised end-to-end through the real Cloudflare Tunnel.
    # renovate: datasource=docker depName=ghcr.io/lexfrei/charts/cloudflare-tunnel-gateway-controller
    - chart: cloudflare-tunnel-gateway-controller
      repoURL: ttl.sh
      targetRevision: 0.0.0-pr.244-1d
      helm:
        valuesObject:
          controller:
            clusterDomain: "k8s.home.lex.la"
          # PR chart re-publishes the same `pr-244-1d` tag on every push.
          # Force pull on each rollout so we pick up the latest build instead
          # of the cached image. Revert with the chart override after merge.
          image:
            pullPolicy: Always
          gatewayClassConfig:
            create: true
            tunnelID: "59db961d-3851-468a-bf80-4d39f942b9e0"
            cloudflareCredentialsSecretRef:
              name: "cloudflare-credentials"
            tunnelTokenSecretRef:
              name: "cloudflare-tunnel-token"
            cloudflared:
              enabled: false
          proxy:
            enabled: true
            tunnelTokenSecretRef:
              name: "cloudflare-tunnel-token"
            image:
              pullPolicy: Always
    - path: manifests/cloudflare-tunnel-gateway-controller
      repoURL: https://github.com/lexfrei/k8s.git
      targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
