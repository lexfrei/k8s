apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-tunnel-gateway-controller
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    namespace: cloudflare-tunnel-system
    server: "https://kubernetes.default.svc"
  sources:
    # OVERRIDE: PR #334 (route GRPCRoute traffic through the in-process L7
    # proxy, closing the v3 regression where gRPC returned 404). Layered on
    # top of the already-merged ListenerSet support. Pre-merge verification
    # only — revert to the released chart once PR #334 merges. See PR #334,
    # closes issue #305.
    # renovate: datasource=docker depName=ghcr.io/lexfrei/charts/cloudflare-tunnel-gateway-controller
    - chart: cloudflare-tunnel-gateway-controller
      repoURL: ttl.sh
      targetRevision: 0.0.0-pr.334-1d
      helm:
        valuesObject:
          controller:
            clusterDomain: "k8s.home.lex.la"
            # PR #334 pre-merge gRPC verification: debug logs + http2 tunnel.
            logLevel: debug
          gatewayClassConfig:
            create: true
            tunnelID: "59db961d-3851-468a-bf80-4d39f942b9e0"
            cloudflareCredentialsSecretRef:
              name: "cloudflare-credentials"
          proxy:
            tunnelTokenSecretRef:
              name: "cloudflare-tunnel-token"
            # gRPC needs http2: cloudflared drops trailers over QUIC. PR #334
            # pre-merge proof; revert with the chart override.
            tunnel:
              protocol: http2
    - path: manifests/cloudflare-tunnel-gateway-controller
      repoURL: https://github.com/lexfrei/k8s.git
      targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
