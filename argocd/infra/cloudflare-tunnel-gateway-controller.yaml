apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-tunnel-gateway-controller
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    namespace: cloudflare-tunnel-system
    server: "https://kubernetes.default.svc"
  sources:
    # OVERRIDE: PR #303 (auto-roll proxy on tunnel-token Secret rotation).
    # ProxySecretReconciler watches the tunnel-token Secret named in
    # --proxy-token-secret and patches the proxy Deployment's pod
    # template annotation on any data change, so Kubernetes natively
    # rolls the pods. Closes the gap where ESO rotates the source
    # Secret out-of-band and cloudflared continues with stale creds.
    # See PR #303 / #114.
    # renovate: datasource=docker depName=ghcr.io/lexfrei/charts/cloudflare-tunnel-gateway-controller
    - chart: cloudflare-tunnel-gateway-controller
      repoURL: ttl.sh
      targetRevision: 0.0.0-pr.303-1d
      helm:
        valuesObject:
          controller:
            clusterDomain: "k8s.home.lex.la"
          gatewayClassConfig:
            create: true
            tunnelID: "59db961d-3851-468a-bf80-4d39f942b9e0"
            cloudflareCredentialsSecretRef:
              name: "cloudflare-credentials"
          proxy:
            tunnelTokenSecretRef:
              name: "cloudflare-tunnel-token"
    - path: manifests/cloudflare-tunnel-gateway-controller
      repoURL: https://github.com/lexfrei/k8s.git
      targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
