apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-tunnel-gateway-controller
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    namespace: cloudflare-tunnel-system
    server: "https://kubernetes.default.svc"
  sources:
    # OVERRIDE: PR #241 feature build (GatewayBackendClientCertificate).
    # Using the PR's published chart so RBAC for backendtlspolicies (added
    # in master after 2.0.4) is included — no out-of-band ClusterRole needed.
    # renovate: datasource=docker depName=ghcr.io/lexfrei/charts/cloudflare-tunnel-gateway-controller
    - chart: cloudflare-tunnel-gateway-controller
      repoURL: ttl.sh
      targetRevision: 0.0.0-pr.241-1d
      helm:
        valuesObject:
          controller:
            clusterDomain: "k8s.home.lex.la"
          gatewayClassConfig:
            create: true
            tunnelID: "59db961d-3851-468a-bf80-4d39f942b9e0"
            cloudflareCredentialsSecretRef:
              name: "cloudflare-credentials"
            tunnelTokenSecretRef:
              name: "cloudflare-tunnel-token"
            cloudflared:
              enabled: false
          proxy:
            enabled: true
            tunnelTokenSecretRef:
              name: "cloudflare-tunnel-token"
    - path: manifests/cloudflare-tunnel-gateway-controller
      repoURL: https://github.com/lexfrei/k8s.git
      targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
