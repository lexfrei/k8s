apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-tunnel-gateway-controller
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    namespace: cloudflare-tunnel-system
    server: "https://kubernetes.default.svc"
  sources:
    # OVERRIDE: PR #299 (fix proxy bootstrap race — EndpointSlice watch).
    # ProxyEndpointReconciler watches EndpointSlices owned by the proxy
    # headless Service and re-pushes the cached config whenever a new
    # proxy pod joins. Removes the "kubectl rollout restart" workaround
    # historically required after every chart bump. See PR #299 / #293.
    # renovate: datasource=docker depName=ghcr.io/lexfrei/charts/cloudflare-tunnel-gateway-controller
    - chart: cloudflare-tunnel-gateway-controller
      repoURL: ttl.sh
      targetRevision: 0.0.0-pr.299-1d
      helm:
        valuesObject:
          controller:
            clusterDomain: "k8s.home.lex.la"
          gatewayClassConfig:
            create: true
            tunnelID: "59db961d-3851-468a-bf80-4d39f942b9e0"
            cloudflareCredentialsSecretRef:
              name: "cloudflare-credentials"
          proxy:
            tunnelTokenSecretRef:
              name: "cloudflare-tunnel-token"
    - path: manifests/cloudflare-tunnel-gateway-controller
      repoURL: https://github.com/lexfrei/k8s.git
      targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
