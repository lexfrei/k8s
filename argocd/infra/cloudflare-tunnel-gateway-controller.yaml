apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-tunnel-gateway-controller
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    namespace: cloudflare-tunnel-system
    server: "https://kubernetes.default.svc"
  sources:
    # OVERRIDE: PR #380 (distributed tracing — wire OpenTelemetry TracerProvider,
    # server/client spans, and OTLP export into the controller and the in-process
    # proxy; opt-in and off by default). Homelab runs with tracing DISABLED (the
    # production default — no proxy.tracing / controller.tracing set below), so the
    # new tracing code paths are inactive here and this verifies the new binary does
    # not regress existing route status / serving on the production cluster.
    # Pre-merge verification only.
    # renovate: datasource=docker depName=ghcr.io/lexfrei/charts/cloudflare-tunnel-gateway-controller
    - chart: cloudflare-tunnel-gateway-controller
      repoURL: ttl.sh
      targetRevision: 0.0.0-pr.380-1d
      helm:
        valuesObject:
          controller:
            clusterDomain: "k8s.home.lex.la"
          gatewayClassConfig:
            create: true
            tunnelID: "59db961d-3851-468a-bf80-4d39f942b9e0"
            cloudflareCredentialsSecretRef:
              name: "cloudflare-credentials"
          proxy:
            tunnelTokenSecretRef:
              name: "cloudflare-tunnel-token"
    - path: manifests/cloudflare-tunnel-gateway-controller
      repoURL: https://github.com/lexfrei/k8s.git
      targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
