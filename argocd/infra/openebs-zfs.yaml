apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openebs-zfs
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    namespace: openebs
    server: "https://kubernetes.default.svc"
  sources:
    - repoURL: "https://openebs.github.io/zfs-localpv"
      targetRevision: "2.10.1"
      chart: zfs-localpv
      helm:
        valuesObject:
          # Resources for the node/controller openebs-zfs-plugin containers.
          # No CPU limit (avoid throttling CSI ops); memory limits are
          # generous over observed usage (node ~52Mi, controller ~13Mi).
          # NOTE: this chart only exposes one resources block per pod, so the
          # CSI sidecars (provisioner/resizer/snapshotter/registrar) cannot be
          # sized individually here — they remain requests/limits-less.
          zfsNode:
            tolerations:
              - operator: Exists
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
          zfsController:
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 192Mi
    - repoURL: https://github.com/lexfrei/k8s.git
      targetRevision: HEAD
      path: manifests/openebs-zfs
  ignoreDifferences:
    - group: zfs.openebs.io
      kind: ZFSVolume
      jsonPointers:
        - /status
        - /metadata/finalizers
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
