apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    namespace: kube-system
    server: "https://kubernetes.default.svc"
  sources:
    - repoURL: "https://kubernetes-sigs.github.io/external-dns/"
      targetRevision: "1.21.1"
      chart: external-dns
      helm:
        valuesObject:
          logLevel: info
          # No CPU limit (avoid throttling); memory limit is generous over
          # observed steady-state (~32Mi) so a resync spike cannot OOM it.
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 192Mi
          provider:
            name: cloudflare
          policy: sync
          rbac:
            # The chart's auto-generated RBAC for the gateway-httproute
            # source grants gateways + httproutes but NOT listenersets.
            # --gateway-listener-sets makes external-dns list/watch
            # ListenerSet resources, so without this rule the informer
            # cache never syncs and the process exits fatal
            # ("failed to sync *v1.ListenerSet ... context deadline
            # exceeded"). Grant the read verbs the informer needs.
            additionalPermissions:
              - apiGroups: ["gateway.networking.k8s.io"]
                resources: ["listenersets"]
                verbs: ["get", "watch", "list"]
          sources:
            - service
            - gateway-httproute
            - crd
          txtOwnerId: cloudflare
          extraArgs:
            - --annotation-filter=external-dns.alpha.kubernetes.io/cloudflare-proxied
            - --gateway-namespace=cloudflare-tunnel-system
            # Follow HTTPRoute parentRefs of Kind=ListenerSet to the parent
            # Gateway's status address (Gateway API v1.5.1 ListenerSet, opt-in
            # since external-dns v0.21.0 / chart 1.21.1, PR kubernetes-sigs/
            # external-dns#6254). Without this a ListenerSet-only route gets
            # no DNS CNAME. Additive — direct Gateway parentRefs keep working.
            - --gateway-listener-sets
            # crd source — used by raw-TCP/SSH tunnel records that don't fit
            # gateway-httproute. The chart auto-generates RBAC for
            # externaldns.k8s.io/dnsendpoints when `crd` is in sources; the
            # CRD itself ships via manifests/external-dns/dnsendpoint-crd.yaml.
            - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
            - --crd-source-kind=DNSEndpoint
          env:
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-api-token
                  key: api-token
    - path: manifests/external-dns
      repoURL: https://github.com/lexfrei/k8s.git
      targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
