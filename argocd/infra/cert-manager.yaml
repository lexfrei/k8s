apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    namespace: cert-manager
    server: "https://kubernetes.default.svc"
  sources:
    - repoURL: "https://charts.jetstack.io"
      targetRevision: "v1.21.0"
      chart: cert-manager
      helm:
        valuesObject:
          installCRDs: true
          podDnsConfig:
            nameservers:
              - "1.1.1.1"
              - "8.8.8.8"
          dns01RecursiveNameserversOnly: true
          dns01RecursiveNameservers: "8.8.8.8:53,1.1.1.1:53"
          config:
            apiVersion: controller.config.cert-manager.io/v1alpha1
            kind: ControllerConfiguration
            enableGatewayAPI: true
          # Resource requests lift the three cert-manager pods out of
          # BestEffort QoS so they are not first to be evicted under node
          # pressure; memory limits cap blast radius. CPU is left unlimited
          # (throttling hurts admission/ACME latency more than it helps).
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          cainjector:
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
          webhook:
            replicaCount: 2
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
            podDisruptionBudget:
              enabled: true
              minAvailable: 1
    - path: manifests/cert-manager
      repoURL: https://github.com/lexfrei/k8s.git
      targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
