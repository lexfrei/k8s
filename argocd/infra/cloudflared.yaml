apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    namespace: cloudflared
    server: "https://kubernetes.default.svc"
  sources:
    # renovate: datasource=docker depName=ghcr.io/lexfrei/charts/cloudflare-tunnel
    - chart: cloudflare-tunnel
      repoURL: ghcr.io/lexfrei/charts
      targetRevision: 0.15.7
      helm:
        valuesObject:
          replicaCount: 1
          cloudflare:
            # Local mode keeps the tunnel ingress here, next to the rest of
            # the in-cluster routing. The classic credentials.json (TunnelID
            # + TunnelSecret + AccountTag) lives in OpenBao and is synced to
            # the node-ssh-tunnel-credentials Secret by ExternalSecret.
            mode: local
            secretName: node-ssh-tunnel-credentials
            # Chart appends `service: http_status:404` automatically when
            # enableDefault404=true (default), so don't repeat it here.
            ingress:
              - hostname: storage-01-ssh.lex.la
                service: ssh://172.16.101.4:22
    - path: manifests/cloudflared
      repoURL: https://github.com/lexfrei/k8s.git
      targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
